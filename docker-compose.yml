services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlb-strikeout-predictor-api:local
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_SSL_MODE: ${DB_SSL_MODE:-REQUIRE}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      SERVER_PORT: 8080
    networks:
      app_net:
        ipv4_address: 172.30.0.10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - /opt/mlb-nginx/certs:/etc/nginx/certs:ro,z
      - /opt/mlb-nginx/acme:/var/www/acme:ro,z
    networks:
      app_net:
        ipv4_address: 172.30.0.11

  web:
    build:
      context: ../mlb-strikeout-predictor-web
      dockerfile: Dockerfile
    image: mlb-strikeout-predictor-web:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${WEB_DB_SSL_MODE:-require}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      API_BASE_URL: http://api:8080
      API_KEY: ${API_KEY}
    networks:
      app_net:
        ipv4_address: 172.30.0.12

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
